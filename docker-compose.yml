services:
  scheme-engine:
    build:
      context: ./backend/scheme-engine
      dockerfile: Dockerfile
    env_file:
      - ./backend/docker.env
    ports:
      - "3001:3001"
    networks:
      - civilens-net

  civilens-api:
    build:
      context: ./backend/civilens-api
      dockerfile: Dockerfile
    env_file:
      - ./backend/docker.env
    depends_on:
      - scheme-engine
    ports:
      - "8080:8080"
    networks:
      - civilens-net

  form-filling-agent:
    build:
      context: ./backend/form_filling_agent
      dockerfile: Dockerfile
    env_file:
      - ./backend/docker.env
    ports:
      - "8000:8000"
    networks:
      - civilens-net

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    networks:
      - civilens-net

  stt-token-service:
    build:
      context: ./backend/stt-token-service
      dockerfile: Dockerfile
    env_file:
      - ./backend/docker.env
    environment:
      FUNCTIONS_WORKER_RUNTIME: node
      AzureWebJobsStorage: >-
        DefaultEndpointsProtocol=http;
        AccountName=devstoreaccount1;
        AccountKey=Eby8vdM02xNoGVfG7fR4q8A7q+4qjB4Y8r8B9S+fJ6c=;
        BlobEndpoint=http://azurite:10000/devstoreaccount1;
        QueueEndpoint=http://azurite:10001/devstoreaccount1;
        TableEndpoint=http://azurite:10002/devstoreaccount1;
    depends_on:
      - azurite
    ports:
      - "7071:7071"
    networks:
      - civilens-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/docker.env
    depends_on:
      - civilens-api
      - form-filling-agent
      - stt-token-service
    ports:
      - "5173:5173"
    networks:
      - civilens-net

networks:
  civilens-net:
    driver: bridge

volumes:
  azurite-data: